<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Poppins;
  background:#0f1117;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;width:100%;
  display:flex;justify-content:space-between;
  padding:15px 8%;
  background:rgba(15,17,23,0.85);
  backdrop-filter:blur(12px);
  z-index:10;
}
nav a{
  color:#aaa;text-decoration:none;margin:0 12px;
  transition:.3s;
}
nav a:hover{
  color:#00e5ff;
  text-shadow:0 0 12px #00e5ff;
}

/* HERO */
#home{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 8%;
}
h1{
  font-size:60px;
  background:linear-gradient(90deg,#fff,#00e5ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.role span{color:#00e5ff}

/* FLOAT */
.hex{
  font-size:90px;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(0,229,255,0.5));
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* BUTTON */
.btn{
  padding:12px 25px;
  background:#00e5ff;
  color:#000;
  border:none;
  border-radius:30px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  font-weight:600;
}
.btn:hover{
  box-shadow:0 0 25px rgba(0,229,255,0.6);
  transform:translateY(-3px);
}

/* SECTIONS */
section{
  padding:90px 8%;
}
.reveal{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}

/* GRID */
.grid{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

/* CARDS */
.card{
  background:#181c27;
  padding:25px;
  border-radius:12px;
  flex:1 1 250px;
  transition:.4s;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(0,229,255,0.2),transparent);
  opacity:0;
  transition:.4s;
}
.card:hover::before{opacity:1}
.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 0 35px rgba(0,229,255,0.25);
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  background:#181c27;
}

/* CURSOR GLOW */
.cursor{
  position:fixed;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(0,229,255,0.15),transparent 60%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>
  <div>Portfolio</div>
  <div>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<section id="home">
  <div>
    <h1>Your Name</h1>
    <p class="role">I'm a <span id="typing"></span></p>
    <button class="btn">Hire Me</button>
  </div>
  <div class="hex">🧑‍🎨</div>
</section>

<section id="services" class="reveal">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">Brand Design</div>
    <div class="card">UI/UX</div>
    <div class="card">Web Dev</div>
  </div>
</section>

<section id="projects" class="reveal">
  <h2>Projects</h2>
  <div class="grid">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<footer>© 2026 Your Name</footer>

<script>
// SCROLL REVEAL
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add("show")}
})
})
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el))

// TYPING
const text=["Graphic Designer","UI/UX Designer","Web Developer"]
let i=0,j=0,current="",isDeleting=false
function type(){
current=text[i]
document.getElementById("typing").textContent=current.substring(0,j)
if(!isDeleting){j++}else{j--}
if(j==current.length){isDeleting=true;setTimeout(type,1000);return}
if(j==0){isDeleting=false;i=(i+1)%text.length}
setTimeout(type,isDeleting?50:100)
}
type()

// CURSOR GLOW
document.addEventListener("mousemove",e=>{
document.querySelector(".cursor").style.left=e.clientX+"px"
document.querySelector(".cursor").style.top=e.clientY+"px"
})
</script>

</body>
</html>
