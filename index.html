<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#0f1117;color:#fff}

/* NAV */
nav{position:fixed;width:100%;display:flex;justify-content:space-between;padding:15px 8%;background:#0f1117cc;backdrop-filter:blur(10px);z-index:10}
nav a{color:#aaa;text-decoration:none;margin:0 10px}
nav a:hover{color:#00e5ff;text-shadow:0 0 10px #00e5ff}

/* HERO */
#home{height:100vh;display:flex;align-items:center;justify-content:space-between;padding:0 8%}
h1{font-size:50px}
.role span{color:#00e5ff}

/* FLOAT */
.hex{font-size:80px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}

/* BUTTON */
.btn{padding:10px 20px;background:#00e5ff;color:#000;border:none;border-radius:30px;cursor:pointer;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;width:0;height:0;background:#fff3;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.btn:active::after{width:300px;height:300px;transition:.5s}

/* SECTIONS */
section{padding:80px 8%}
.reveal{opacity:0;transform:translateY(40px);transition:.8s}
.reveal.show{opacity:1;transform:translateY(0)}

/* CARDS */
.card{background:#181c27;padding:20px;border-radius:10px;margin:10px;transition:.3s}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 0 25px rgba(0,229,255,0.3)}

/* GRID */
.grid{display:flex;flex-wrap:wrap}

/* FOOTER */
footer{text-align:center;padding:20px;background:#181c27}
</style>
</head>

<body>

<nav>
  <div>Portfolio</div>
  <div>
    <a href="#home">Home</a>
    <a href="#services">Services</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<section id="home">
  <div>
    <h1>Your Name</h1>
    <p class="role">I'm a <span id="typing"></span></p>
    <button class="btn">Hire Me</button>
  </div>
  <div class="hex">🧑‍🎨</div>
</section>

<section id="services" class="reveal">
  <h2>Services</h2>
  <div class="grid">
    <div class="card">Brand Design</div>
    <div class="card">UI/UX</div>
    <div class="card">Web Dev</div>
  </div>
</section>

<section id="projects" class="reveal">
  <h2>Projects</h2>
  <div class="grid">
    <div class="card">Project 1</div>
    <div class="card">Project 2</div>
    <div class="card">Project 3</div>
  </div>
</section>

<footer>© 2026 Your Name</footer>

<script>
// SCROLL ANIMATION
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){entry.target.classList.add("show")}
})
})
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el))

// TYPING EFFECT
const text=["Graphic Designer","UI/UX Designer","Web Developer"]
let i=0,j=0,current="",isDeleting=false

function type(){
current=text[i]
document.getElementById("typing").textContent=current.substring(0,j)

if(!isDeleting){j++}else{j--}

if(j==current.length){isDeleting=true;setTimeout(type,1000);return}
if(j==0){isDeleting=false;i=(i+1)%text.length}

setTimeout(type,isDeleting?50:100)
}
type()
</script>

</body>
</html>
