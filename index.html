<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio — Your Name</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
/* ===== YOUR ORIGINAL CSS (SHORTENED HERE BUT KEEP YOURS) ===== */
body{margin:0;font-family:Poppins;background:#0f1117;color:#fff}

/* KEEP YOUR FULL ORIGINAL CSS HERE (important) */

/* ===== ADD ONLY THIS BELOW ===== */

.reveal{
  opacity:0;
  transform:translateY(60px);
  transition:1s ease;
}
.reveal.show{
  opacity:1;
  transform:translateY(0);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

.hex-wrap{
  animation:float 4s ease-in-out infinite;
}

.service-card:hover,
.proj-card:hover,
.review-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:0 0 30px rgba(0,229,255,0.2);
}

.nav-links a:hover{
  text-shadow:0 0 10px var(--cyan);
}
</style>
</head>

<body>

<!-- KEEP YOUR FULL ORIGINAL HTML EXACTLY SAME -->

<!-- ===== ADD THIS SCRIPT AT VERY END ===== -->

<script>
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show")
    }
  })
},{threshold:0.15});

document.querySelectorAll("section").forEach(el=>{
  el.classList.add("reveal");
  observer.observe(el);
});

// typing
const roles=["Graphic Designer","UI/UX Designer","Web Developer"];
let i=0,j=0,current="",isDeleting=false;
const roleEl=document.querySelector(".role span");

function type(){
  current=roles[i];
  roleEl.textContent=current.substring(0,j);

  if(!isDeleting){j++} else {j--}

  if(j===current.length){isDeleting=true;setTimeout(type,1000);return;}
  if(j===0){isDeleting=false;i=(i+1)%roles.length;}

  setTimeout(type,isDeleting?50:100);
}
type();
</script>

</body>
</html>
